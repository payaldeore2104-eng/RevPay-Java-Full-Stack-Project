<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Reset Password – RevPay</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" th:href="@{/css/theme.css}" />
    <script th:src="@{/js/theme-toggle.js}"></script>
    <style>
        .security-select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all .2s;
        }

        .security-select:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, .15);
        }
    </style>
</head>

<body>
    <button class="auth-float-toggle" onclick="toggleTheme()" title="Toggle Dark Mode"><span
            class="theme-icon">🌙</span></button>
    <div class="auth-wrapper" style="justify-content:center;align-items:center;background:var(--bg);">
        <div style="width:100%;max-width:480px;padding:40px 20px;">
            <div class="card fade-in">
                <div style="text-align:center;margin-bottom:22px;">
                    <div style="font-size:40px;margin-bottom:8px;">🔑</div>
                    <div class="auth-title" style="font-size:20px;">Reset Password</div>
                    <div class="auth-subtitle">Verify your identity to set a new password</div>
                </div>

                <div th:if="${param.error}" class="alert alert-danger">⚠️ Verification failed. Please check your answers
                    and try again.</div>

                <!-- Step 1: Verify Questions -->
                <div th:if="${param.step == null}">
                    <p style="font-size:13px;color:var(--text-secondary);margin-bottom:18px;text-align:center;">
                        Enter your Email/Phone and answer two security questions.
                    </p>
                    <form th:action="@{/forgot-password/verify}" method="post">
                        <div class="form-group">
                            <label class="form-label">Email or Phone</label>
                            <input type="text" name="loginId" required class="form-control"
                                placeholder="Registered email or phone" />
                        </div>
                        <div class="form-group">
                            <label class="form-label">Security Question 1</label>
                            <select name="q1Id" required class="security-select">
                                <option value="" disabled selected>Select a question...</option>
                                <option th:each="q : ${questions}" th:value="${q.ID}" th:text="${q.QUESTION}"></option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Answer 1</label>
                            <input type="text" name="a1" required class="form-control" placeholder="Your answer" />
                        </div>
                        <div class="form-group">
                            <label class="form-label">Security Question 2</label>
                            <select name="q2Id" required class="security-select">
                                <option value="" disabled selected>Select a question...</option>
                                <option th:each="q : ${questions}" th:value="${q.ID}" th:text="${q.QUESTION}"></option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Answer 2</label>
                            <input type="text" name="a2" required class="form-control" placeholder="Your answer" />
                        </div>
                        <button type="submit" class="btn btn-primary btn-block btn-lg">Verify Answers →</button>
                    </form>
                </div>

                <!-- Step 2: New Password -->
                <div th:if="${param.step != null and param.step[0] == 'reset'}">
                    <div class="alert alert-success">✅ Identity verified! Please enter your new password.</div>
                    <form th:action="@{/forgot-password/reset}" method="post">
                        <div class="form-group">
                            <label class="form-label">New Password</label>
                            <input type="password" name="newPassword" required class="form-control"
                                placeholder="Choose a strong new password" />
                        </div>
                        <button type="submit" class="btn btn-success btn-block btn-lg">Save New Password →</button>
                    </form>
                </div>

                <div style="text-align:center;margin-top:18px;font-size:13px;color:var(--text-secondary);">
                    Remembered it? <a th:href="@{/login}" style="color:var(--secondary-blue);font-weight:700;">Back to
                        Login →</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
