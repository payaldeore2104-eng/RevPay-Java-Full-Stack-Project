<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Transaction PIN – RevPay</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" th:href="@{/css/theme.css}" />
    <script th:src="@{/js/theme-toggle.js}"></script>
</head>

<body>
    <button class="auth-float-toggle" onclick="toggleTheme()" title="Toggle Dark Mode"><span
            class="theme-icon">🌙</span></button>
    <div
        style="display:flex;justify-content:center;align-items:center;min-height:100vh;background:var(--bg);padding:24px;">
        <div style="width:100%;max-width:420px;">
            <div class="card fade-in" style="padding:40px;">
                <div style="text-align:center;margin-bottom:24px;">
                    <div style="font-size:48px;margin-bottom:10px;">🔐</div>
                    <div class="auth-title" style="font-size:20px;">Transaction PIN</div>
                    <div class="auth-subtitle"
                        th:text="${hasExistingPin} ? 'Change your 4-digit Transaction PIN' : 'Set up a new 4-digit Transaction PIN'">
                    </div>
                </div>

                <div th:if="${error}" class="alert alert-danger">❌ <span th:text="${error}"></span></div>
                <div th:if="${param.error}" class="alert alert-danger">❌ Something went wrong. Please try again.</div>

                <form th:action="@{/profile/transaction-pin/send-otp}" method="post">
                    <div class="form-group" th:if="${hasExistingPin}">
                        <label class="form-label">Current 4-digit PIN</label>
                        <input type="password" name="currentPin" maxlength="4" required class="pin-input"
                            placeholder="••••" pattern="\d{4}" autocomplete="off" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">New 4-digit PIN</label>
                        <input type="password" name="newPin" maxlength="4" required class="pin-input" placeholder="••••"
                            pattern="\d{4}" autocomplete="off" />
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg">📧 Send Verification Email</button>
                    <a th:href="@{/profile}" class="btn btn-ghost btn-block"
                        style="margin-top:10px;text-align:center;display:block;">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
