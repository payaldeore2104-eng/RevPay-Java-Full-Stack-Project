<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Invoice Detail – RevPay</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" th:href="@{/css/theme.css}" />
    <script th:src="@{/js/theme-toggle.js}"></script>
</head>

<body class="fade-in">
    <div class="revpay-wrapper">
        <div class="revpay-header">
            <div class="brand">
                <div class="brand-icon">💳</div>RevPay
            </div>
            <nav class="header-nav">
                <a th:href="@{/dashboard}">Dashboard</a>
                <a th:href="@{/business/dashboard}">Business</a>
                <a th:href="@{/notifications}">Notifications</a>
            </nav>
            <div class="header-right">
                <button class="btn-theme-toggle" onclick="toggleTheme()"><span class="theme-icon">🌙</span></button>
            </div>
        </div>
        <div class="revpay-body">
            <aside class="revpay-sidebar">
                <div class="sidebar-section-label">Business</div>
                <a th:href="@{/business/dashboard}"><span class="sidebar-icon">🏢</span> Business Dashboard</a>
                <a th:href="@{/business/invoices/create}"><span class="sidebar-icon">🧾</span> Create Invoice</a>
            </aside>
            <main class="revpay-main">
                <a th:href="@{/business/dashboard}"
                    style="display:inline-flex;align-items:center;gap:6px;color:var(--secondary-blue);font-size:13px;font-weight:600;text-decoration:none;margin-bottom:18px;">←
                    Back to Dashboard</a>

                <!-- Invoice Header -->
                <div class="card mb-20">
                    <div
                        style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:20px;">
                        <div>
                            <div style="font-size:24px;font-weight:800;color:var(--secondary-blue);">Invoice #<span
                                    th:text="${invoice.ID}"></span></div>
                            <p style="color:var(--text-secondary);font-size:14px;margin-top:4px;"
                                th:text="${invoice.DESCRIPTION}"></p>
                        </div>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <a th:href="@{'/business/invoices/' + ${invoice.ID} + '/pdf'}"
                                class="btn btn-ghost btn-sm">📄 Download PDF</a>
                            <span th:class="'badge ' + ${invoice.STATUS}" th:text="${invoice.STATUS}"></span>
                        </div>
                    </div>
                    <hr style="border:none;border-top:1px solid var(--border);margin:0 0 18px;" />

                    <!-- From/To -->
                    <div class="grid-2 mb-20">
                        <div style="background:var(--bg-alt);border-radius:var(--radius-md);padding:14px;">
                            <div
                                style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;">
                                From (Business)</div>
                            <div style="font-weight:700;font-size:15px;" th:text="${invoice.BUSINESS_NAME}">—</div>
                            <div style="font-size:13px;color:var(--text-secondary);"
                                th:text="${invoice.BUSINESS_EMAIL}">—</div>
                        </div>
                        <div style="background:var(--bg-alt);border-radius:var(--radius-md);padding:14px;">
                            <div
                                style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;">
                                To (Customer)</div>
                            <div style="font-weight:700;font-size:15px;" th:text="${invoice.CUSTOMER_NAME}">—</div>
                            <div style="font-size:13px;color:var(--text-secondary);"
                                th:text="${invoice.CUSTOMER_EMAIL}">—</div>
                            <div style="font-size:13px;color:var(--text-secondary);"
                                th:text="${invoice.CUSTOMER_ADDRESS}">—</div>
                        </div>
                    </div>

                    <!-- Meta -->
                    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;">
                        <div>
                            <div
                                style="font-size:11px;color:var(--text-muted);text-transform:uppercase;font-weight:700;letter-spacing:.8px;margin-bottom:4px;">
                                Due Date</div>
                            <div style="font-weight:600;" th:text="${#dates.format(invoice.DUE_DATE,'dd MMM yyyy')}">—
                            </div>
                        </div>
                        <div>
                            <div
                                style="font-size:11px;color:var(--text-muted);text-transform:uppercase;font-weight:700;letter-spacing:.8px;margin-bottom:4px;">
                                Created On</div>
                            <div style="font-weight:600;" th:text="${#dates.format(invoice.CREATED_AT,'dd MMM yyyy')}">—
                            </div>
                        </div>
                        <div>
                            <div
                                style="font-size:11px;color:var(--text-muted);text-transform:uppercase;font-weight:700;letter-spacing:.8px;margin-bottom:4px;">
                                Payment Terms</div>
                            <div style="font-weight:600;" th:text="${invoice.PAYMENT_TERMS}">—</div>
                        </div>
                        <div>
                            <div
                                style="font-size:11px;color:var(--text-muted);text-transform:uppercase;font-weight:700;letter-spacing:.8px;margin-bottom:4px;">
                                Total Amount</div>
                            <div style="font-size:20px;font-weight:800;color:var(--secondary-blue);"
                                th:text="'₹' + ${#numbers.formatDecimal(invoice.TOTAL_AMOUNT,1,2)}">₹0</div>
                        </div>
                    </div>
                </div>

                <!-- Line Items -->
                <div class="card">
                    <div class="section-title mb-16">Line Items</div>
                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Description</th>
                                    <th>Qty</th>
                                    <th>Unit Price</th>
                                    <th>Tax</th>
                                    <th>Total</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${items}">
                                    <td th:text="${item.DESCRIPTION}"></td>
                                    <td th:text="${item.QUANTITY}"></td>
                                    <td th:text="'₹' + ${#numbers.formatDecimal(item.UNIT_PRICE,1,2)}"></td>
                                    <td th:text="'₹' + ${#numbers.formatDecimal(item.TAX,1,2)}"></td>
                                    <td style="font-weight:700;"
                                        th:text="'₹' + ${#numbers.formatDecimal(item.LINE_TOTAL,1,2)}"></td>
                                </tr>
                            </tbody>
                            <tfoot>
                                <tr style="background:var(--bg-alt);">
                                    <td colspan="4" style="text-align:right;font-weight:700;padding-right:20px;">Grand
                                        Total</td>
                                    <td style="font-size:16px;font-weight:800;color:var(--secondary-blue);"
                                        th:text="'₹' + ${#numbers.formatDecimal(invoice.TOTAL_AMOUNT,1,2)}"></td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>

</html>
